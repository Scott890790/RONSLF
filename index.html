<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicSpark</title>
    <style>
        /* CSS: Styling the Website */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .form-container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        h2 { color: #38bdf8; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0ea5e9;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #0284c7; }
        #message { margin-top: 20px; text-align: center; color: #4ade80; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>AI Technology Interest</h2>
    <form id="aiForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" required placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="interest">Primary AI Interest:</label>
            <select id="interest">
                <option value="machine-learning">Machine Learning</option>
                <option value="nlp">Natural Language Processing (NLP)</option>
                <option value="computer-vision">Computer Vision</option>
                <option value="robotics">Robotics</option>
                <option value="generative-ai">Generative AI (e.g., ChatGPT)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="experience">Experience Level:</label>
            <select id="experience">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="expert">Expert</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comments">Why are you interested in AI?</label>
            <textarea id="comments" rows="4" placeholder="Share your thoughts..."></textarea>
        </div>

        <button type="submit">Submit Information</button>
    </form>
    <p id="message"></p>
</div>

<script>
    // JavaScript: Handling Form Submission
    document.getElementById('aiForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevents the page from reloading
        
        const name = document.getElementById('name').value;
        const interest = document.getElementById('interest').value;
        
        document.getElementById('message').innerText = 
            `Thank you, ${name}! Your interest in ${interest.replace('-', ' ')} has been recorded.`;
        
        this.reset(); // Clears the form
    });
</script>

</body>
                  </html>
